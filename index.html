<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q-nomy AI Portal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <img src="assets/qnomyailogo_transparent.png" alt="Q·nomy AI Logo" class="logo" />
        <div class="brand-text">
          <span class="brand-title">Q-nomy AI</span>
          <span class="brand-sub">Weekly Brief</span>
        </div>
      </div>
      <div class="header-meta">
        <span class="edition-badge">Edition</span>
        <span class="edition-date" id="edition-date"></span>
      </div>
    </div>
  </header>

  <!-- ── TAB NAV ── -->
  <nav class="tab-nav" role="tablist" aria-label="Site sections">
    <div class="tab-nav-inner">
      <button class="tab-btn tab-btn--active" role="tab" id="tab-brief" aria-selected="true" aria-controls="panel-brief" tabindex="0">Weekly Brief</button>
      <button class="tab-btn" role="tab" id="tab-projects" aria-selected="false" aria-controls="panel-projects" tabindex="-1">AI Projects</button>
      <button class="tab-btn" role="tab" id="tab-skills" aria-selected="false" aria-controls="panel-skills" tabindex="-1">Skills Repo</button>
    </div>
  </nav>

  <!-- ── PANEL: WEEKLY BRIEF ── -->
  <div class="tab-panel" id="panel-brief" role="tabpanel" aria-labelledby="tab-brief">

    <!-- ── HERO BAND ── -->
    <section class="hero-band">
      <div class="hero-inner">
        <div class="hero-text-block">
          <h1 class="hero-title">Your AI World, Curated Weekly</h1>
          <p class="hero-lead">Q-nomy AI's curated pulse on the world of Artificial Intelligence — handpicked, no noise.</p>
        </div>
        <div class="lang-toggle">
          <button class="lang-btn lang-btn--active" type="button" data-lang="en">EN</button>
          <button class="lang-btn" type="button" data-lang="he">עב</button>
        </div>
      </div>
    </section>

    <!-- ── NEWS GRID ── -->
    <main>
      <div class="section-header">
        <h2 class="section-title" id="section-title-btn" role="button" tabindex="0" aria-expanded="true" aria-controls="news-grid">This Week's Highlights</h2>
        <span class="article-count" id="article-count"></span>
      </div>

      <div class="news-grid" id="news-grid">
        <!-- Cards injected by news.js -->
      </div>
    </main>

    <!-- ── ARCHIVE ── -->
    <section class="archive-section">
      <div class="archive-inner">
        <div class="section-header">
          <h2 class="section-title archive-toggle" id="archive-toggle-btn" role="button" tabindex="0" aria-expanded="true" aria-controls="archive-list">Previous Editions</h2>
        </div>
        <div class="archive-list" id="archive-list">
          <!-- Weeks injected by app.js -->
        </div>
      </div>
    </section>

  </div><!-- /panel-brief -->

  <!-- ── PANEL: AI PROJECTS ── -->
  <div class="tab-panel tab-panel--hidden" id="panel-projects" role="tabpanel" aria-labelledby="tab-projects">
    <div class="comingsoon-wrap">
      <img src="assets/qnomyai_comingsoon.png" alt="AI Projects — Coming Soon" class="comingsoon-img" />
    </div>
  </div><!-- /panel-projects -->

  <!-- ── PANEL: SKILLS REPO ── -->
  <div class="tab-panel tab-panel--hidden" id="panel-skills" role="tabpanel" aria-labelledby="tab-skills">
    <div class="comingsoon-wrap">
      <img src="assets/qnomyai_comingsoon.png" alt="Skills Repo — Coming Soon" class="comingsoon-img" />
    </div>
  </div><!-- /panel-skills -->

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-inner">
      <img src="assets/qnomyailogo_transparent.png" alt="Q·nomy AI" class="footer-logo" />
      <p class="footer-copy">© <span id="footer-year"></span> Q-nomy AI Program. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/news.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
